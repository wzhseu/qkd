[server]
port = 5002

[socket_server]
port = 9000
# Legacy fallback only. New session-key flow uses Physical_Keys/b.txt.
sm4_secret_key = 11011110000110011000011010101000111001100010011001101001110000001011001000001100011010100000110101111011001101010010001101001001

[auto_import]
enabled = true
path = QKD_Keys
source = qkd_app
per_line = true
recursive = false
interval_sec = 5
patterns = a.txt,outkey*.txt,quantum_key*.txt

[physical_import]
enabled = true
path = Physical_Keys/b.txt
source = physical_qkd_app
interval_sec = 5

[database]
# The database is created automatically at gateway_data/quantum_gateway.db.
